name: End-to-End Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-e2e:
    timeout-minutes: 15
    runs-on: ubuntu-latest

    # 1. Spin up isolated PostgreSQL service container
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespassword
          POSTGRES_DB: saas_mvp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Python & Backend Environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi

      # 3. Setup Node.js & Frontend Environment
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/my-app/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: frontend/my-app
        run: npm ci

      # 4. Cache Playwright Browsers to speed up pipeline runs
      - name: Get Playwright Version
        id: playwright-version
        run: echo "version=$(node -p "require('./frontend/my-app/package.json').devDependencies['@playwright/test']")" >> $GITHUB_OUTPUT

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Browsers with Dependencies
        working-directory: frontend/my-app
        run: npx playwright install --with-deps chromium

        # Initialize DB Schema (Create global tables like admins, tenant_accounts)
      - name: Initialize Database Schema
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/saas_mvp_test
        run: |
          python -c "from database import engine, Base; import models; Base.metadata.create_all(bind=engine)"
        # 5. Execute Playwright E2E Suite
      - name: Run Playwright Tests
        working-directory: frontend/my-app
        env:
          DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/saas_mvp_test
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
          SECRET_KEY: ci_super_secret_test_key_for_hmac_sha256_verification
          NEXT_TELEMETRY_DISABLED: 1
          CI: true
        run: npx playwright test

      # 6. Upload Test Artifacts on Failure
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: frontend/my-app/playwright-report/
          retention-days: 14